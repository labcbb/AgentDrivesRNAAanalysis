name: Auto Sync All ThirdParty Skills
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@github.com"

      - name: Sync nature-figure to sRNAgent/skills/nature-figure
        run: |
          PREFIX="sRNAgent/skills/nature-figure"
          REMOTE_URL="https://github.com/Yuan1z0825/nature-skills.git"
          
          # 添加远程仓库
          git remote add upstream-nature "$REMOTE_URL" 2>/dev/null || git remote set-url upstream-nature "$REMOTE_URL"
          
          # 获取所有历史
          git fetch upstream-nature main --depth=2147483647
          
          if [ ! -d "$PREFIX" ]; then
            echo "First time import, run subtree add"
            # 使用 git subtree split 先分离出目标目录，再添加
            git subtree add --prefix="$PREFIX" upstream-nature/main --squash
            
            # 然后通过 filter-branch 或直接从分离的目录复制
            mkdir -p "$PREFIX"
            git checkout upstream-nature/main -- skills/nature-figure
            
            # 把内容移到正确位置
            if [ -d "skills/nature-figure" ] && [ "$PREFIX" != "skills/nature-figure" ]; then
              rm -rf "$PREFIX"
              mv skills/nature-figure "$PREFIX"
              git rm -r skills --cached 2>/dev/null || true
              git add "$PREFIX"
              git commit -m "Add nature-figure skill from upstream" || true
            fi
          else
            echo "Update existing subtree"
            git checkout upstream-nature/main -- skills/nature-figure
            rm -rf "$PREFIX"
            mv skills/nature-figure "$PREFIX"
            git add "$PREFIX"
            git commit -m "Update nature-figure skill from upstream" || true
            git rm -r skills --cached 2>/dev/null || true
          fi

      - name: Commit & push changes
        run: |
          git add .
          git commit -m "Auto sync third-party skills" || echo "No updates to commit"
          git push
