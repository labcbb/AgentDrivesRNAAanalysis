- name: Sync nature-figure and commit
  run: |
    mkdir -p sRNAgent/skills
    rm -rf sRNAgent/skills/nature-figure || true
    
    git archive --remote=https://github.com/Yuan1z0825/nature-skills.git \
      main:skills/nature-figure | tar x -C sRNAgent/skills/
    
    git config --global user.name "Sync Bot"
    git config --global user.email "sync-bot@github.com"
    git add sRNAgent/skills/nature-figure
    git commit -m "Auto sync nature-figure from upstream" || echo "No updates to commit"
    git push
