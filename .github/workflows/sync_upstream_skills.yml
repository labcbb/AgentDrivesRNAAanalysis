name: Auto Sync All ThirdParty Skills
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare upstream remote
        run: |
          git remote add upstream-nature https://github.com/Yuan1z0825/nature-skills.git || true
          git config --global http.timeout 300
          git fetch upstream-nature main

      # 同步 nature-figure 修复版
      - name: Sync nature-figure to sRNAgent/skills/nature-figure
        run: |
          PREFIX="sRNAgent/skills/nature-figure"
          UPSTREAM=upstream-nature
          BRANCH=main
          SRC_DIR=skills/nature-figure

          TMP_COMMIT=$(git subtree split --prefix=${SRC_DIR} ${UPSTREAM}/${BRANCH})

          if [ ! -d "$PREFIX" ]; then
            echo "First time import, run subtree add"
            git subtree add --prefix="$PREFIX" ${TMP_COMMIT} --squash
          else
            echo "Update existing subtree, run subtree pull"
            git subtree pull --prefix="$PREFIX" ${TMP_COMMIT} --squash
          fi

      - name: Commit & push changes
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@github.com"
          git add .
          git commit -m "Auto sync third-party skills" || echo "No updates to commit"
          git push
