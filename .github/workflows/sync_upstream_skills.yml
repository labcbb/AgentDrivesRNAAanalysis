name: Auto Sync Nature Figure Skill
on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00) 自动执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动点击运行

# 必须显式赋予 Action 写入权限，否则推送代码会报 403 权限错误
permissions:
  contents: write

jobs:
  sync_skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync nature-figure folder only
        run: |
          # 1. 定义变量
          UPSTREAM_URL="https://github.com/Yuan1z0825/nature-skills.git"
          SRC_DIR="skills/nature-figure"
          DEST_DIR="sRNAgent/skills/nature-figure"
          TMP_DIR="tmp_upstream"

          # 2. 清理历史残余
          rm -rf "$TMP_DIR" "$DEST_DIR"
          mkdir -p sRNAgent/skills

          echo "==> 开始稀疏克隆上游仓库..."
          # --no-checkout 表示先不拉取任何文件，只建立连接，速度极快
          git clone --depth 1 --no-checkout "$UPSTREAM_URL" "$TMP_DIR"
          cd "$TMP_DIR"
          
          # 初始化稀疏签出，并指定只签出 skills/nature-figure 目录
          git sparse-checkout init --cone
          git sparse-checkout set "$SRC_DIR"
          
          # 此时才会真正将该文件夹内容拉取到本地
          git checkout main
          cd ..

          echo "==> 拷贝目标文件夹到 sRNAgent/skills/ 下..."
          # 将解压出来的 skills/nature-figure 完整拷贝到你的 DEST_DIR 
          cp -r "$TMP_DIR/$SRC_DIR" "$DEST_DIR"

          # 清理临时克隆目录
          rm -rf "$TMP_DIR"
          echo "==> 拷贝完成！"

      - name: Commit and push changes
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@github.com"
          
          # 将新拷贝的文件夹添加到暂存区
          git add sRNAgent/skills/nature-figure
          
          # 检查是否有文件更新，如果有则提交并 Push
          if ! git diff --cached --quiet; then
            git commit -m "Auto sync latest nature-figure from upstream"
            git push origin HEAD:${{ github.ref_name }}
            echo "Successfully pushed updates!"
          else
            echo "No changes detected, repository is up to date."
          fi
