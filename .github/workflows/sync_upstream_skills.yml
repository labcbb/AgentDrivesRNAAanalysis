name: Auto Sync All ThirdParty Skills
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare upstream remote
        run: |
          git remote add upstream-nature https://github.com/Yuan1z0825/nature-skills.git || true
          git fetch upstream-nature main

      # 同步 nature-figure，自动区分首次add / 后续pull
      - name: Sync nature-figure to sRNAgent/skills/nature-figure
        run: |
          PREFIX="sRNAgent/skills/nature-figure"
          if [ ! -d "$PREFIX" ]; then
            echo "First time import, run subtree add"
            git subtree add --prefix="$PREFIX" upstream-nature main:skills/nature-figure --squash
          else
            echo "Update existing subtree, run subtree pull"
            git subtree pull --prefix="$PREFIX" upstream-nature main:skills/nature-figure --squash
          fi

      # 后续新增其他skill在这里追加
      # - name: Sync xxx-skill
      #   run: |
      #     PREFIX="sRNAgent/skills/xxx"
      #     git remote add upstream-xxx https://xxx.git || true
      #     git fetch upstream-xxx main
      #     if [ ! -d "$PREFIX" ]; then
      #       git subtree add --prefix="$PREFIX" upstream-xxx main:xxx-path --squash
      #     else
      #       git subtree pull --prefix="$PREFIX" upstream-xxx main:xxx-path --squash
      #     fi

      - name: Commit & push changes
        run: |
          git config --global user.name "Sync Bot"
          git config --global user.email "sync-bot@github.com"
          git add .
          git commit -m "Auto sync third-party skills" || echo "No updates to commit"
          git push
